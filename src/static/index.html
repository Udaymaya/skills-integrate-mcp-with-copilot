<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="user-controls">
        <button id="user-menu-btn" class="user-icon-btn" type="button" aria-label="User menu">👤</button>
        <div id="user-menu" class="user-menu hidden">
          <button id="login-open-btn" type="button">Login</button>
          <button id="logout-btn" type="button" class="hidden">Logout</button>
        </div>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p id="auth-status" class="auth-status">Viewing as student</p>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Registration Controls</h3>
        <p id="signup-help">
          Teachers can register or unregister students after logging in.
        </p>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <div class="modal-content">
        <h3 id="login-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="teacher-username">Username:</label>
            <input id="teacher-username" type="text" required />
          </div>
          <div class="form-group">
            <label for="teacher-password">Password:</label>
            <input id="teacher-password" type="password" required />
          </div>
          <div class="modal-actions">
            <button type="submit">Login</button>
            <button id="login-cancel-btn" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
